<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Navigation Bar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
</head>
<body>
  <div class="wrapper">
    <input type="checkbox" id="btn" hidden>
    
    <label for="btn" class="menu-btn">
      <i class="fas fa-bars"></i>
    </label>

    <nav id="sidebar">
      <div class="title">Menu Site</div>
      <ul class="list-items">
        <li><a href="#"><i class="fas fa-home"></i>Home</a></li>
        <li><a href="#"><i class="fas fa-user"></i>Sobre</a></li>
        <li><a href="#"><i class="fas fa-cog"></i>Configurações</a></li>
        <li><a href="#"><i class="fas fa-envelope"></i>Contato</a></li>
        
        <div class="icons">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
      </ul>
    </nav>
  </div>

  <div class="content">
    <div class="header">Conteúdo do Site</div>
    <p>Clique no ícone no canto superior esquerdo para abrir o menu lateral.</p>
  </div>
</body>
</html>
